<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Welcome — TechPass</title>
<!-- shared styles -->
 <link href="site.css" rel="stylesheet"/>
<link href="nav.css" rel="stylesheet"/>

<style>
    /* banner card specific styles */
    .hero {
      min-height: calc(100vh - 96px);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .banner {
      background: #fff;
      width: 680px;
      max-width: 92%;
      border-radius: 28px;
      padding: 34px 40px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
      display: flex;
      flex-direction: column;
      gap: 20px;
      align-items: center;
      text-align: center;
    }

    .banner .logos {
      display:flex;
      gap:5px;
      align-items:center;
      justify-content:center;
      width:100%;
    }

    .banner .logos img {
      height:120px;
      width:auto;
      object-fit:contain;
      display:block;
    }

    .banner h1 {
      margin:0;
      font-size:22px;
      letter-spacing:0.6px;
      color:#111;
      font-weight:800;
      text-transform:uppercase;
    }

    .banner small { display:block; color:#333; margin-top:4px; font-weight:600; }

    /* clickable look */
    .banner-link { color:inherit; text-decoration:none; display:block; }
    .banner:hover { transform:translateY(-4px); transition:transform .18s ease; }

    @media (max-width:720px){
      .banner .logos img{height:86px}
      .banner{padding:22px}
      .banner h1{font-size:18px}
    }
  </style>
</head>
<body>
<header>
<nav>
<div class="nav-menu">
  <a href="index.html">Home</a>
  <a href="About_page.html">About</a>
  <a href="service.html">Service</a>
  <a href="Contact.html">Contact</a>
  <a href="announcement.html">Announcement</a>
  <a href="Request.html">Request</a>
</div>

</nav>
</header>


<main class="hero" role="main">
<a aria-label="Open login page" class="banner-link" href="login_page.html">
<section class="banner" role="button">
<div aria-hidden="true" class="logos">
<img alt="CCIS logo" src="logo/ccis logo (no bg).png"/>
<img alt="ITSoc logo" src="logo/itsoc logo (no bg).png"/>
</div>
<h1>TECHPASS: YOUR CAMPUS<br/>FEE SIMPLIFIED</h1>
<small>Click anywhere on this card to proceed to login</small>
</section>
</a>
</main>
</body>
</html>
