<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Admin Dashboard - TechPass</title>
<style>
/* Reusing your existing theme */
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: Arial, sans-serif; background: #1e3c72; min-height: 100vh; padding: 20px; }
.container { max-width: 1000px; margin: 0 auto; background: white; border-radius: 15px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

h1 { color: #1e6bb8; margin-bottom: 20px; border-bottom: 2px solid #eee; padding-bottom: 15px; }
.section { margin-bottom: 40px; padding: 20px; background: #f8f9fa; border-radius: 10px; border: 1px solid #ddd; }
h2 { font-size: 18px; margin-bottom: 15px; color: #333; }

/* Forms */
.form-group { margin-bottom: 15px; }
label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 5px; color: #555; }
input, select { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; }
button { background: #1e6bb8; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; }
button:hover { background: #155a9c; }
button.logout { background: #dc3545; float: right; }

/* Feedback Messages */
.message { padding: 10px; border-radius: 5px; margin-bottom: 15px; display: none; }
.success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
.error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

/* Debug Info Box */
.debug-info {
    margin-top: 30px;
    padding: 10px;
    background: #eee;
    border: 1px dashed #999;
    color: #555;
    font-size: 11px;
    font-family: monospace;
}
</style>
</head>
<body>

<div class="container">
    <button class="logout" onclick="window.location.href='php/logout.php'">Logout</button>
    <h1>Administrator Dashboard</h1>

    <div id="feedback" class="message"></div>

    <!-- SECTION 1: ASSIGN OFFICER -->
    <div class="section">
        <h2>👑 Assign Officer Position</h2>
        <p style="font-size: 13px; color: #666; margin-bottom: 10px;">Select a student to promote them to an officer position.</p>
        
        <form id="assignForm">
            <div class="form-group">
                <label>Select Student:</label>
                <select id="officerStudent" required>
                    <option value="">Loading students...</option>
                </select>
            </div>
            <div class="form-group">
                <label>Select Position:</label>
                <select id="positionName" required>
                    <option value="">-- Choose Position --</option>
                    <option value="President">President</option>
                    <option value="Vice President">Vice President</option>
                    <option value="Treasurer">Treasurer</option>
                    <option value="Secretary">Secretary</option>
                    <option value="Auditor">Auditor</option>
                    <option value="Business Manager">Business Manager</option>
                    <option value="PIO">PIO</option>
                    <option value="Athletic Manager">Athletic Manager</option>
                    <option value="Representative">Representative</option>
                </select>
            </div>
            <button type="submit">Assign Position</button>
        </form>
    </div>

    <!-- SECTION 2: RESET PASSWORD -->
    <div class="section">
        <h2>🔒 Reset Student Password</h2>
        <p style="font-size: 13px; color: #666; margin-bottom: 10px;">Force update a student's password.</p>

        <form id="resetForm">
            <div class="form-group">
                <label>Select Student:</label>
                <select id="resetStudent" required>
                    <option value="">Loading students...</option>
                </select>
            </div>
            <div class="form-group">
                <label>New Password:</label>
                <input type="text" id="newPassword" placeholder="Enter new password" required minlength="6">
            </div>
            <button type="submit" style="background: #e67e22;">Update Password</button>
        </form>
    </div>

    <div id="debugStatus" class="debug-info">Loading Session Info...</div>
</div>

<script>
// 1. Check Session (PERMISSIVE MODE - No Redirect on Name Mismatch)
fetch('php/check_session.php?_=' + new Date().getTime())
    .then(res => res.json())
    .then(data => {
        const debugBox = document.getElementById('debugStatus');
        
        if (!data.success) {
            // Only redirect if NOT LOGGED IN AT ALL
            window.location.href = 'login_page.html';
            return;
        }

        // Show debug info on screen instead of blocking access
        const pos = data.user.position || "Unknown";
        debugBox.innerHTML = `✅ <strong>Logged In As:</strong> ${data.user.full_name} | <strong>Role:</strong> ${pos}`;

        if (pos !== 'Administrator') {
            debugBox.innerHTML += ` <span style="color:red; font-weight:bold;">(Warning: System does not see 'Administrator' tag, but access is open)</span>`;
        }
    })
    .catch(err => {
        console.error("Session Check Error:", err);
    });

// 2. Load Student List
fetch('php/get_all_users.php')
    .then(res => res.json())
    .then(data => {
        if (data.success) {
            let options = '<option value="">-- Select a Student --</option>';
            data.users.forEach(user => {
                options += `<option value="${user.id}">${user.stud_no} - ${user.fname} ${user.lname}</option>`;
            });
            document.getElementById('officerStudent').innerHTML = options;
            document.getElementById('resetStudent').innerHTML = options;
        }
    });

// 3. Handle Officer Assignment
document.getElementById('assignForm').addEventListener('submit', function(e) {
    e.preventDefault();
    if(!confirm("Are you sure you want to assign this position?")) return;

    const formData = new FormData();
    formData.append('user_id', document.getElementById('officerStudent').value);
    formData.append('position', document.getElementById('positionName').value);

    sendData('php/assign_position.php', formData);
});

// 4. Handle Password Reset
document.getElementById('resetForm').addEventListener('submit', function(e) {
    e.preventDefault();
    if(!confirm("Are you sure you want to change this user's password?")) return;

    const formData = new FormData();
    formData.append('user_id', document.getElementById('resetStudent').value);
    formData.append('new_password', document.getElementById('newPassword').value);

    sendData('php/admin_reset_password.php', formData);
});

// Helper Function
function sendData(url, formData) {
    const feedback = document.getElementById('feedback');
    feedback.style.display = 'block';
    feedback.textContent = 'Processing...';
    feedback.className = 'message';

    fetch(url, { method: 'POST', body: formData })
    .then(res => res.json())
    .then(data => {
        feedback.textContent = data.message;
        feedback.className = data.success ? 'message success' : 'message error';
    })
    .catch(err => {
        console.error(err);
        feedback.textContent = "System Error: " + err.message;
        feedback.className = 'message error';
    });
}
</script>
</body>
</html>
