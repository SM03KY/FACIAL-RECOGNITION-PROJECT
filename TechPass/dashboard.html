<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Officer Dashboard - TechPass</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg, #1e3c72 0%, #2a5298 100%);
    min-height: 100vh;
    padding: 20px;
}

.dashboard-container {
    max-width: 1400px;
    margin: 0 auto;
}

/* Header */
.header {
    background: white;
    padding: 20px 30px;
    border-radius: 15px;
    margin-bottom: 25px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.header-left h1 {
    font-size: 24px;
    color: #2d3748;
    margin-bottom: 5px;
}

.position-badge {
    display: inline-block;
    background: #667eea;
    color: white;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
}

.header-right {
    display: flex;
    gap: 15px;
    align-items: center;
}

.user-info {
    text-align: right;
}

.user-name {
    font-weight: 600;
    color: #2d3748;
    font-size: 14px;
}

.user-number {
    font-size: 12px;
    color: #718096;
}

.logout-btn {
    background: #e53e3e;
    color: white;
    border: none;
    padding: 10px 20px;
    border-radius: 8px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
}

.logout-btn:hover {
    background: #c53030;
}

/* Stats Grid */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-bottom: 25px;
}

.stat-card {
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.stat-label {
    font-size: 13px;
    color: #718096;
    font-weight: 600;
    margin-bottom: 10px;
}

.stat-value {
    font-size: 32px;
    font-weight: 700;
    color: #2d3748;
}

.stat-card.total { border-left: 4px solid #667eea; }
.stat-card.verified { border-left: 4px solid #48bb78; }
.stat-card.pending { border-left: 4px solid #ed8936; }
.stat-card.requests { border-left: 4px solid #f56565; }

/* Tab Navigation */
.tab-nav {
    background: white;
    border-radius: 12px;
    padding: 10px;
    margin-bottom: 25px;
    display: flex;
    gap: 10px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
}

.tab-btn {
    flex: 1;
    background: transparent;
    border: none;
    padding: 12px 20px;
    cursor: pointer;
    font-weight: 600;
    font-size: 14px;
    color: #718096;
    border-radius: 8px;
    transition: all 0.3s;
}

.tab-btn.active {
    background: #667eea;
    color: white;
}

.tab-btn:hover:not(.active) {
    background: #f7fafc;
}

/* Tab Content */
.tab-content {
    display: none;
}

.tab-content.active {
    display: block;
}

/* Cards */
.card {
    background: white;
    border-radius: 15px;
    padding: 25px;
    box-shadow: 0 4px 6px rgba(0,0,0,0.1);
    margin-bottom: 25px;
}

.card-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 2px solid #e2e8f0;
}

.card-title {
    font-size: 18px;
    font-weight: 700;
    color: #2d3748;
}

.add-btn {
    background: #48bb78;
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 6px;
    cursor: pointer;
    font-weight: 600;
    font-size: 13px;
}

.add-btn:hover {
    background: #38a169;
}

/* Table */
.data-table {
    width: 100%;
    border-collapse: collapse;
}

.data-table th {
    text-align: left;
    padding: 12px;
    background: #f7fafc;
    color: #4a5568;
    font-size: 13px;
    font-weight: 600;
    border-bottom: 2px solid #e2e8f0;
}

.data-table td {
    padding: 12px;
    border-bottom: 1px solid #e2e8f0;
    font-size: 14px;
}

.data-table tr:hover {
    background: #f7fafc;
}

/* Status Badges */
.badge {
    display: inline-block;
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 12px;
    font-weight: 600;
}

.badge-verified {
    background: #c6f6d5;
    color: #22543d;
}

.badge-pending {
    background: #feebc8;
    color: #7c2d12;
}

.badge-rejected {
    background: #fed7d7;
    color: #742a2a;
}

/* Action Buttons */
.action-btns {
    display: flex;
    gap: 8px;
}

.btn-verify {
    background: #48bb78;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
}

.btn-reject {
    background: #f56565;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
}

.btn-view {
    background: #667eea;
    color: white;
    border: none;
    padding: 6px 12px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    font-weight: 600;
}

/* Loading & Empty States */
.loading {
    text-align: center;
    padding: 40px;
    color: #718096;
}

.empty-state {
    text-align: center;
    padding: 40px;
    color: #a0aec0;
    font-size: 14px;
}

/* Responsive */
@media (max-width: 1200px) {
    .stats-grid {
        grid-template-columns: repeat(2, 1fr);
    }
}

@media (max-width: 768px) {
    .header {
        flex-direction: column;
        gap: 15px;
    }
    
    .stats-grid {
        grid-template-columns: 1fr;
    }
    
    .tab-nav {
        flex-wrap: wrap;
    }
}
</style>
</head>
<body>

<div class="dashboard-container">
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <h1>Officer Dashboard <span class="position-badge" id="positionBadge">Loading...</span></h1>
        </div>
        <div class="header-right">
            <div class="user-info">
                <div class="user-name" id="userName">Loading...</div>
                <div class="user-number" id="userNumber">-</div>
            </div>
            <button class="logout-btn" onclick="logout()">Logout</button>
        </div>
    </div>

    <!-- Stats Grid -->
    <div class="stats-grid">
        <div class="stat-card total">
            <div class="stat-label">TOTAL PAYMENTS</div>
            <div class="stat-value" id="totalPayments">0</div>
        </div>
        <div class="stat-card verified">
            <div class="stat-label">VERIFIED</div>
            <div class="stat-value" id="verifiedPayments">0</div>
        </div>
        <div class="stat-card pending">
            <div class="stat-label">PENDING REVIEW</div>
            <div class="stat-value" id="pendingPayments">0</div>
        </div>
        <div class="stat-card requests">
            <div class="stat-label">OPEN REQUESTS</div>
            <div class="stat-value" id="openRequests">0</div>
        </div>
    </div>

    <!-- Tab Navigation -->
    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('payments', event)">Pending Payments</button>
        <button class="tab-btn" onclick="switchTab('requests', event)">Student Requests</button>
        <button class="tab-btn" onclick="switchTab('announcements', event)">Announcements</button>
        <button class="tab-btn" onclick="switchTab('events', event)">Events</button>
    </div>

    <!-- Payments Tab -->
    <div id="paymentsTab" class="tab-content active">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Pending Payment Verifications</h2>
            </div>
            <div id="paymentsTable" class="loading">Loading payments...</div>
        </div>
    </div>

    <!-- Requests Tab -->
    <div id="requestsTab" class="tab-content">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Student Requests</h2>
            </div>
            <div id="requestsTable" class="loading">Loading requests...</div>
        </div>
    </div>

    <!-- Announcements Tab -->
    <div id="announcementsTab" class="tab-content">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Announcements</h2>
                <button class="add-btn" onclick="createAnnouncement()">+ New Announcement</button>
            </div>
            <div id="announcementsTable" class="loading">Loading announcements...</div>
        </div>
    </div>

    <!-- Events Tab -->
    <div id="eventsTab" class="tab-content">
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Events Calendar</h2>
                <button class="add-btn" onclick="createEvent()">+ New Event</button>
            </div>
            <div id="eventsTable" class="loading">Loading events...</div>
        </div>
    </div>
</div>

<script>
let currentTab = 'payments';

// Check if user is logged in and is an officer
fetch('../php/check_session.php')
    .then(response => response.json())
    .then(data => {
        if (!data.success || !data.user.is_officer) {
            alert('Access denied. Officers only.');
            window.location.href = '../login_page.html';
            return;
        }
        
        document.getElementById('userName').textContent = data.user.full_name;
        document.getElementById('userNumber').textContent = data.user.student_number;
        document.getElementById('positionBadge').textContent = data.user.position;
        
        loadOfficerDashboard();
    })
    .catch(error => {
        console.error('Session check error:', error);
        window.location.href = '../login_page.html';
    });

function loadOfficerDashboard() {
    fetch('../php/get_officer_dashboard.php')
        .then(response => response.json())
        .then(data => {
            if (data.success) {
                updateStats(data.data.stats);
                displayPayments(data.data.pending_payments);
                displayRequests(data.data.requests);
                displayAnnouncements(data.data.announcements);
                displayEvents(data.data.events);
            }
        })
        .catch(error => {
            console.error('Error loading dashboard:', error);
        });
}

function updateStats(stats) {
    document.getElementById('totalPayments').textContent = stats.total_payments || 0;
    document.getElementById('verifiedPayments').textContent = stats.verified || 0;
    document.getElementById('pendingPayments').textContent = stats.pending || 0;
    document.getElementById('openRequests').textContent = stats.open_requests || 0;
}

function displayPayments(payments) {
    const container = document.getElementById('paymentsTable');
    
    if (!payments || payments.length === 0) {
        container.innerHTML = '<div class="empty-state">No pending payments to verify</div>';
        return;
    }
    
    let html = `
        <table class="data-table">
            <thead>
                <tr>
                    <th>Student</th>
                    <th>Fee Type</th>
                    <th>Amount</th>
                    <th>Payment Date</th>
                    <th>Reference</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
    `;
    
    payments.forEach(payment => {
        html += `
            <tr>
                <td><strong>${payment.student_name}</strong><br><small>${payment.student_number}</small></td>
                <td>${payment.fee_name}</td>
                <td>₱${parseFloat(payment.amount_paid).toFixed(2)}</td>
                <td>${new Date(payment.payment_date).toLocaleDateString()}</td>
                <td>${payment.reference_number || 'N/A'}</td>
                <td><span class="badge badge-pending">Pending</span></td>
                <td>
                    <div class="action-btns">
                        <button class="btn-verify" onclick="verifyPayment(${payment.payment_id})">Verify</button>
                        <button class="btn-reject" onclick="rejectPayment(${payment.payment_id})">Reject</button>
                    </div>
                </td>
            </tr>
        `;
    });
    
    html += '</tbody></table>';
    container.innerHTML = html;
}

function displayRequests(requests) {
    const container = document.getElementById('requestsTable');
    
    if (!requests || requests.length === 0) {
        container.innerHTML = '<div class="empty-state">No pending requests</div>';
        return;
    }
    
    let html = `
        <table class="data-table">
            <thead>
                <tr>
                    <th>Student</th>
                    <th>Request Type</th>
                    <th>Details</th>
                    <th>Date</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
    `;
    
    requests.forEach(request => {
        let badgeClass = 'badge-pending';
        if (request.status === 'Completed') badgeClass = 'badge-verified';
        if (request.status === 'Rejected') badgeClass = 'badge-rejected';
        
        html += `
            <tr>
                <td><strong>${request.student_name}</strong><br><small>${request.student_number}</small></td>
                <td>${request.request_type}</td>
                <td>${request.details ? request.details.substring(0, 50) + '...' : 'N/A'}</td>
                <td>${new Date(request.created_at).toLocaleDateString()}</td>
                <td><span class="badge ${badgeClass}">${request.status}</span></td>
                <td>
                    <button class="btn-view" onclick="viewRequest(${request.request_id})">View</button>
                </td>
            </tr>
        `;
    });
    
    html += '</tbody></table>';
    container.innerHTML = html;
}

function displayAnnouncements(announcements) {
    const container = document.getElementById('announcementsTable');
    
    if (!announcements || announcements.length === 0) {
        container.innerHTML = '<div class="empty-state">No announcements yet</div>';
        return;
    }
    
    let html = `
        <table class="data-table">
            <thead>
                <tr>
                    <th>Title</th>
                    <th>Content Preview</th>
                    <th>Posted</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
    `;
    
    announcements.forEach(ann => {
        html += `
            <tr>
                <td><strong>${ann.title}</strong>${ann.is_pinned ? ' 📌' : ''}</td>
                <td>${ann.content.substring(0, 60)}...</td>
                <td>${new Date(ann.post_date).toLocaleDateString()}</td>
                <td><span class="badge ${ann.is_active ? 'badge-verified' : 'badge-pending'}">${ann.is_active ? 'Active' : 'Inactive'}</span></td>
                <td>
                    <button class="btn-view" onclick="editAnnouncement(${ann.announcement_id})">Edit</button>
                </td>
            </tr>
        `;
    });
    
    html += '</tbody></table>';
    container.innerHTML = html;
}

function displayEvents(events) {
    const container = document.getElementById('eventsTable');
    
    if (!events || events.length === 0) {
        container.innerHTML = '<div class="empty-state">No events scheduled</div>';
        return;
    }
    
    let html = `
        <table class="data-table">
            <thead>
                <tr>
                    <th>Event Name</th>
                    <th>Date</th>
                    <th>Location</th>
                    <th>Mandatory</th>
                    <th>Actions</th>
                </tr>
            </thead>
            <tbody>
    `;
    
    events.forEach(event => {
        html += `
            <tr>
                <td><strong>${event.event_name}</strong></td>
                <td>${new Date(event.start_date).toLocaleDateString()}${event.start_time ? ' ' + event.start_time : ''}</td>
                <td>${event.location || 'TBA'}</td>
                <td>${event.is_mandatory ? '✓ Yes' : 'No'}</td>
                <td>
                    <button class="btn-view" onclick="editEvent(${event.event_id})">Edit</button>
                </td>
            </tr>
        `;
    });
    
    html += '</tbody></table>';
    container.innerHTML = html;
}

function switchTab(tabName, event) {
    document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
    });
    
    document.querySelectorAll('.tab-btn').forEach(btn => {
        btn.classList.remove('active');
    });
    
    document.getElementById(tabName + 'Tab').classList.add('active');
    event.target.classList.add('active');
    currentTab = tabName;
}

function verifyPayment(paymentId) {
    if (confirm('Verify this payment?')) {
        alert('Payment verification feature coming soon!\nPayment ID: ' + paymentId);
    }
}

function rejectPayment(paymentId) {
    const reason = prompt('Enter reason for rejection:');
    if (reason) {
        alert('Payment rejection feature coming soon!\nPayment ID: ' + paymentId + '\nReason: ' + reason);
    }
}

function viewRequest(requestId) {
    alert('Request details view coming soon!\nRequest ID: ' + requestId);
}

function createAnnouncement() {
    alert('Create announcement feature coming soon!');
}

function editAnnouncement(announcementId) {
    alert('Edit announcement feature coming soon!\nAnnouncement ID: ' + announcementId);
}

function createEvent() {
    alert('Create event feature coming soon!');
}

function editEvent(eventId) {
    alert('Edit event feature coming soon!\nEvent ID: ' + eventId);
}

function logout() {
    if (confirm('Are you sure you want to logout?')) {
        window.location.href = '../php/logout.php';
    }
}
</script>

</body>
</html>
