<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Service — TechPass / ITSoc</title>
<link href="site.css" rel="stylesheet"/>
<link href="nav.css" rel="stylesheet"/>
<style>
    /* page-specific layout for service page */
    :root{--blue:#3571a8;--panel:#eef3f7;--card:#d7e0ea}
    html,body{height:100%;margin:0;background:var(--blue);font-family:Arial,Helvetica,sans-serif;padding-top:64px}
    .wrap{max-width:1100px;margin:28px auto;padding:0 18px}

    .panel{background:transparent;padding:28px 0}
    .layout{display:grid;grid-template-columns:360px 1fr;gap:36px;align-items:start;max-width:980px;margin:0 auto}

    /* left logo column */
    .logo-column{
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .logo-card{
      background:#fff;
      width:100%;
      border-radius:18px;
      padding:24px;
      box-shadow:0 10px 30px rgba(0,0,0,0.12);
      display:flex;
      flex-direction:column;
      align-items:center;
      gap:14px;
    }
    .logo-card img{width:78%;height:auto;display:block;border-radius:8px}
    .org-title{color:#0b4f7a;font-weight:800;font-size:16px;text-align:center}
    .subtitle{color:#666;font-size:13px;text-align:center}

    /* right card grid */
    .cards{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:28px;
      align-items:stretch;
    }
    .service-card{
      background:var(--card);
      height:180px;
      border-radius:20px;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:18px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,0.3);
      transition:transform .18s ease, box-shadow .18s ease;
    }
    .service-card:hover{transform:translateY(-6px);box-shadow:0 18px 30px rgba(0,0,0,0.12)}

    .service-title{font-weight:800;color:#083b5b;text-align:center}

    /* responsive */
    @media (max-width:900px){
      .layout{grid-template-columns:1fr;gap:24px}
      .cards{grid-template-columns:1fr 1fr}
      .logo-card img{width:40%}
    }
    @media (max-width:560px){
      .cards{grid-template-columns:1fr;gap:16px}
    }
  </style>
</head>
<body>
<header>
<nav>
<div class="nav-menu">
  <a href="index.html">Home</a>
  <a href="About_page.html">About</a>
  <a href="service.html">Service</a>
  <a href="Contact.html">Contact</a>
  <a href="announcement.html">Announcement</a>
  <a href="Request.html">Request</a>
</div>

</nav>
</header>


<main class="wrap">
<section aria-labelledby="services-heading" class="panel" role="main">
<div class="layout">
<aside aria-labelledby="org-name" class="logo-column">
<div aria-hidden="false" class="logo-card">
<img alt="Information Technology Society logo" src="logo/itsoc logo (no bg).png"/>
<div class="org-title" id="org-name">Information Technology Society</div>
<div class="subtitle">Academic Organization</div>
</div>
</aside>
<div>
<h2 id="services-heading" style="color:#fff;margin:8px 0 18px;font-size:18px">Our Services</h2>
<div aria-label="Service list" class="cards">
<div class="service-card" role="article">
<div class="service-title">Printing Service </div>
</div>
<div class="service-card" role="article">
<div class="service-title">Water</div>
</div>
<div class="service-card" role="article">
<div class="service-title">____</div>
</div>
<div class="service-card" role="article">
<div class="service-title">___</div>
</div>
</div>
</div>
</div>
</section>
</main>
</body>
</html>
