<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width,initial-scale=1" name="viewport"/>
<title>Request — TechPass / ITSoc</title>
<link href="site.css" rel="stylesheet"/>
<link href="nav.css" rel="stylesheet"/>
<style>
    :root{--blue:#3b78a9;--panel:#eef0f2;--input:#e6e6e6;--white:#fff}
    html,body{height:100%;margin:0;background:var(--blue);font-family:Arial,Helvetica,sans-serif;padding-top:64px}
    .wrap{max-width:1100px;margin:28px auto;padding:0 18px}

    .panel{background:transparent;padding:40px 0}
    .layout{display:grid;grid-template-columns:420px 1fr;gap:40px;align-items:start;max-width:980px;margin:0 auto}

    .logo-card{
      background:var(--white);
      border-radius:20px;
      padding:28px;
      box-shadow:0 10px 30px rgba(0,0,0,.12);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
    }
    .logo-card img{width:85%;height:auto;display:block}
    .org-title{margin-top:18px;color:#0b4f7a;font-weight:800;font-size:18px;text-align:center}
    .subtitle{color:#666;margin-top:6px;font-size:13px;text-align:center}

    .form-box{padding:10px 6px}
    .section-title{color:#fff;text-align:left;margin-bottom:10px;font-weight:700;letter-spacing:1px}
    form.request-form{display:flex;flex-direction:column;gap:12px}
    label.form-label{font-size:11px;color:#d7e4f0;font-weight:700;letter-spacing:.6px}
    input[type="text"], input[type="email"], textarea{
      width:100%;padding:10px;border-radius:4px;border:0;background:var(--input);box-sizing:border-box;
    }
    textarea{min-height:120px;resize:vertical}

    .btn-send{width:140px;padding:8px 12px;border-radius:18px;border:0;background:#fff;color:var(--blue);font-weight:700;cursor:pointer;align-self:flex-start}
    /* small screen */
    @media (max-width:960px){
      .layout{grid-template-columns:1fr;gap:20px;padding:0 8px}
      .logo-card{order:0}
    }
  </style>
</head>
<body>
<header>
<nav>
<div class="nav-menu">
  <a href="index.html">Home</a>
  <a href="About_page.html">About</a>
  <a href="service.html">Service</a>
  <a href="Contact.html">Contact</a>
  <a href="announcement.html">Announcement</a>
  <a href="Request.html">Request</a>
</div>

</nav>
</header>


<main class="wrap">
<section class="panel">
<div class="layout" role="main">
<aside aria-hidden="true" class="logo-card">
<img alt="ITSoc logo" src="logo/itsoc logo (no bg).png"/>
<div class="org-title">Information Technology Society</div>
<div class="subtitle">Academic Organization</div>
</aside>
<div aria-labelledby="request-heading" class="form-box">
<div class="section-title" id="request-heading">SEND REQUEST</div>
<form class="request-form" id="requestForm" onsubmit="handleRequest(event)">
<div>
<label class="form-label" for="name">ENTER YOUR NAME</label>
<input id="name" name="name" required="" type="text"/>
</div>
<div>
<label class="form-label" for="student">ENTER YOUR STUDENT NUMBER</label>
<input id="student" name="student" required="" type="text"/>
</div>
<div>
<label class="form-label" for="email">ENTER YOUR EMAIL</label>
<input id="email" name="email" required="" type="email"/>
</div>
<div>
<label class="form-label" for="request">REQUEST</label>
<input id="request" name="request" placeholder="Remarks / request title" type="text"/>
</div>
<div>
<label class="form-label" for="remarks">REMARKS</label>
<textarea id="remarks" name="remarks" placeholder="Details (optional)"></textarea>
</div>
<button class="btn-send" type="submit">SEND REQUEST</button>
</form>
</div>
</div>
</section>
</main>
<script>
function handleRequest(e){
  e.preventDefault();
  const form = e.target;
  // simple validation already handled by required attributes
  // show confirmation and reset form
  alert('Request sent');
  form.reset();
}
</script>
</body>
</html>
