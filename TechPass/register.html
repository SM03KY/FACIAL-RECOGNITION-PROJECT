<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Register - TechPass</title>
<link href="site.css" rel="stylesheet"/>
<link href="nav.css" rel="stylesheet"/>
<style>
    /* SCROLLING FIX IS HERE */
    body {
        background-color: #1e6bb8;
        display: flex;
        justify-content: center;
        align-items: flex-start; 
        min-height: 100vh;
        margin: 0;
        font-family: Arial, sans-serif;
        padding: 120px 20px 40px; 
        box-sizing: border-box;
    }

    .register-card {
        background-color: #f0f0f0;
        padding: 30px;
        border-radius: 15px;
        width: 480px;
        max-width: 100%;
        box-shadow: 0 3px 10px rgba(0,0,0,0.2);
        margin-bottom: 40px; 
    }

    .logo-container {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        margin-bottom: 20px;
    }

    .logo { height: 70px; object-fit: contain; }
    .title { text-align: center; font-size: 16px; font-weight: bold; margin-bottom: 20px; color: #1e6bb8; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 12px; font-weight: 600; color: #333; margin-bottom: 4px; }

    input[type="text"], input[type="email"], input[type="password"], select {
        width: 100%; padding: 10px; border: 1px solid #cfcfcf; border-radius: 6px; box-sizing: border-box; font-size: 14px;
    }

    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 70px; }
    .toggle-pass {
        position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
        background: #e6e6e6; border: 1px solid #cfcfcf; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px;
    }

    .register-btn { background-color: #1e6bb8; color: white; padding: 12px 20px; border: none; border-radius: 6px; cursor: pointer; width: 100%; font-weight: 600; margin-top: 10px; }
    .register-btn:disabled { background-color: #95b3d1; cursor: not-allowed; }
    
    .login-link { text-align: center; margin-top: 15px; font-size: 13px; }
    .login-link a { color: #1e6bb8; font-weight: bold; text-decoration: none; }
    .alert { padding: 10px; margin-bottom: 15px; border-radius: 5px; font-size: 13px; display: none; text-align: center; font-weight: bold; }
    .alert-success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
    .alert-error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }

    .face-id-card { border: 2px dashed #1e6bb8; padding: 15px; border-radius: 10px; background: #eef6ff; margin: 20px 0; text-align: center; }
    .viewfinder-container { width: 100%; height: 240px; background-color: #000; border-radius: 8px; margin-bottom: 15px; overflow: hidden; display: flex; justify-content: center; align-items: center; }
    #cameraStream { width: 100%; height: 100%; object-fit: cover; display: none; }
    .placeholder-text { color: #888; font-size: 12px; }
</style>
</head>
<body>
<header>
<nav>
<div class="nav-menu">
  <a href="index.html">Home</a>
  <a href="About_page.html">About</a>
  <a href="service.html">Service</a>
  <a href="Contact.html">Contact</a>
  <a href="announcement.html">Announcement</a>
  <a href="Request.html">Request</a>
</div>
</nav>
</header>

<div class="register-card">
<div class="logo-container">
<img alt="TechPass Logo" class="logo" src="logo/itsoc logo (no bg).png"/>
<img alt="CCIS Logo" class="logo" src="logo/ccis logo (no bg).png"/>
</div>
<div class="title">Create Your TechPass Account</div>

<div id="alertMessage" class="alert"></div>

<!-- NOTICE THE METHOD="POST" HERE -->
<form id="registerForm" method="POST">
<div class="form-row">
<div class="form-group"><label>First Name *</label><input name="first_name" required type="text"/></div>
<div class="form-group"><label>Last Name *</label><input name="last_name" required type="text"/></div>
</div>
<div class="form-group"><label>Student Number *</label><input name="student_number" placeholder="e.g., 00-000000" required type="text"/></div>
<div class="form-group"><label>Email Address *</label><input name="email" placeholder="your.email@mmsu.edu.ph" required type="email"/></div>

<div class="form-row">
<div class="form-group"><label>Year Level *</label>
<select name="year_level" required>
<option value="">Select Year</option><option value="1">1st Year</option><option value="2">2nd Year</option><option value="3">3rd Year</option><option value="4">4th Year</option>
</select>
</div>
<div class="form-group"><label>Program *</label>
<select name="program" required>
<option value="">Select Program</option><option value="BSCS">BS Computer Science</option><option value="BSIT">BS Information Technology</option>
</select>
</div>
</div>

<div class="form-group"><label>Phone Number (Optional)</label><input name="phone_number" placeholder="09XXXXXXXXX" type="text"/></div>

<!-- FACE ID SECTION -->
<div class="face-id-card">
    <label style="color: #1e6bb8; font-size: 14px; margin-bottom: 10px; display: block;">STEP 2: FACE ID REGISTRATION *</label>
    <div class="viewfinder-container">
        <img id="cameraStream" src="" alt="Live Feed">
        <div id="placeholder" class="placeholder-text">Camera Offline</div>
    </div>
    <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 10px;">
        <button type="button" id="startCamBtn" class="toggle-pass" style="position: static; transform: none; background: #444; color: white; border: none; padding: 8px 15px;">Start Preview</button>
        <button type="button" id="captureBtn" class="toggle-pass" style="position: static; transform: none; background: #1e6bb8; color: white; border: none; padding: 8px 15px; display: none;">Capture Face ID</button>
    </div>
    <span id="photoStatus" style="font-size: 12px; font-weight: bold; color: #dc3545;">No Photo Linked</span>
    <input type="hidden" id="face_id_ready" name="face_id_ready" value="0">
</div>

<div class="form-group"><label>Password *</label>
<div class="password-wrapper"><input id="password" name="password" required type="password"/><button class="toggle-pass" id="togglePassword" type="button">Show</button></div>
</div>

<div class="form-group"><label>Confirm Password *</label>
<div class="password-wrapper"><input id="confirm_password" name="confirm_password" required type="password"/><button class="toggle-pass" id="toggleConfirm" type="button">Show</button></div>
</div>

<button class="register-btn" id="registerBtn" type="submit">Create Account</button>
<div class="login-link"><p>Already have an account? <a href="login_page.html">Login here</a></p></div>
</form>
</div>

<script>
// 1. Toggle Passwords
function setupToggle(inputId, btnId) {
    document.getElementById(btnId).addEventListener('click', function() {
        let input = document.getElementById(inputId);
        input.type = (input.type === 'password') ? 'text' : 'password';
        this.textContent = (input.type === 'password') ? 'Show' : 'Hide';
    });
}
setupToggle('password', 'togglePassword'); 
setupToggle('confirm_password', 'toggleConfirm');

// 2. Camera Logic
const camIp = "192.168.18.54"; 
const streamImg = document.getElementById('cameraStream');
const placeholder = document.getElementById('placeholder');
const startCamBtn = document.getElementById('startCamBtn');
const captureBtn = document.getElementById('captureBtn');
const photoStatus = document.getElementById('photoStatus');
const faceIdReady = document.getElementById('face_id_ready');

startCamBtn.addEventListener('click', function() {
    streamImg.src = `http://${camIp}/stream?t=${new Date().getTime()}`;
    streamImg.style.display = 'block';
    placeholder.style.display = 'none';
    startCamBtn.style.display = 'none';
    captureBtn.style.display = 'inline-block';
    photoStatus.textContent = 'Live Feed Active. Align your face.';
    photoStatus.style.color = '#1e6bb8';
});

captureBtn.addEventListener('click', function() {
    if (captureBtn.textContent === 'Retake Photo') {
        streamImg.src = `http://${camIp}/stream?t=${new Date().getTime()}`;
        streamImg.style.display = 'block';
        placeholder.style.display = 'none';
        
        captureBtn.textContent = 'Capture Face ID';
        photoStatus.textContent = 'Live Feed Active. Align your face.';
        photoStatus.style.color = '#1e6bb8';
        faceIdReady.value = "0"; 
        return; 
    }

    captureBtn.disabled = true; 
    captureBtn.textContent = 'Capturing...';
    
    streamImg.src = ""; 
    streamImg.style.display = 'none';
    placeholder.style.display = 'block';
    placeholder.textContent = 'Processing Image...';
    
    setTimeout(() => {
        fetch(`http://${camIp}/capture`) 
            .then(() => {
                photoStatus.textContent = 'Verifying with XAMPP...';
                
                let check = setInterval(() => {
                    fetch('php/check_status.php')
                    .then(res => res.text())
                    .then(status => {
                        if (status.includes("uploads/")) {
                            clearInterval(check);
                            
                            streamImg.src = status.trim() + "?t=" + new Date().getTime();
                            streamImg.style.display = 'block';
                            placeholder.style.display = 'none';

                            photoStatus.textContent = '✅ Face ID Captured!';
                            photoStatus.style.color = '#28a745';
                            faceIdReady.value = "1";
                            captureBtn.textContent = 'Retake Photo';
                            captureBtn.disabled = false;
                        }
                    });
                }, 1500);
            })
            .catch(() => {
                photoStatus.textContent = '❌ Capture Failed';
                captureBtn.disabled = false; 
                captureBtn.textContent = 'Retry';
                placeholder.textContent = 'Camera Offline';
            });
    }, 500);
});

// 3. Form Submission Logic
function showAlert(message, type) {
    const alertDiv = document.getElementById('alertMessage');
    alertDiv.textContent = message;
    alertDiv.className = 'alert alert-' + type;
    alertDiv.style.display = 'block';
    window.scrollTo({ top: 0, behavior: 'smooth' }); // Scrolls to top so user sees the message
    setTimeout(() => { alertDiv.style.display = 'none'; }, 5000);
}

document.getElementById('registerForm').addEventListener('submit', function(e) {
    // THIS STOPS THE URL FROM CHANGING AND BREAKING THE UPLOAD
    e.preventDefault(); 

    if (document.getElementById('face_id_ready').value === "0") {
        showAlert('Please capture your Face ID before registering!', 'error');
        return;
    }

    const password = document.getElementById('password').value;
    const confirmPassword = document.getElementById('confirm_password').value;
    
    if (password !== confirmPassword) {
        showAlert('Passwords do not match!', 'error');
        return;
    }

    const registerBtn = document.getElementById('registerBtn');
    const formData = new FormData(this);
    
    registerBtn.disabled = true;
    registerBtn.textContent = 'Creating Account...';
    
    fetch('php/register.php', {
        method: 'POST',
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            showAlert(data.message, 'success');
            setTimeout(() => {
                window.location.href = 'login_page.html';
            }, 2000);
        } else {
            showAlert(data.message, 'error');
            registerBtn.disabled = false;
            registerBtn.textContent = 'Create Account';
        }
    })
    .catch(error => {
        console.error('Error:', error);
        showAlert('Database error. Check your PHP files.', 'error');
        registerBtn.disabled = false;
        registerBtn.textContent = 'Create Account';
    });
});
</script>
</body>
</html>
